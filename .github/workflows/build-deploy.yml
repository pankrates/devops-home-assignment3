name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        options: [dev, staging]
        default: dev

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}
  REGISTRY: ${{ vars.GCP_REGION }}-docker.pkg.dev
  REPOSITORY: payment-api-repo
  IMAGE_NAME: payment-api
  GKE_CLUSTER: payment-api-cluster
  NAMESPACE: payment-api

jobs:
  # ----------------------------------------------------------------
  # Job 1: Dockerfile lint (hadolint)
  # ----------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: app/Dockerfile

  # ----------------------------------------------------------------
  # Job 2: Build, push, and scan
  # ----------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      id-token: write  # required for Workload Identity Federation

    outputs:
      image_tag: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v6

      # Authenticate to GCP via Workload Identity Federation (no SA key)
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build Docker image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} app/

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL

      - name: Push image to Artifact Registry
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ----------------------------------------------------------------
  # Job 3: Deploy to GKE via Helm (with auto-rollback)
  # ----------------------------------------------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Get GKE credentials via Connect Gateway
        uses: google-github-actions/get-gke-credentials@v3
        with:
          project_id: ${{ env.PROJECT_ID }}
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.REGION }}
          use_connect_gateway: true
          fleet_membership_name: projects/${{ env.PROJECT_ID }}/locations/${{ env.REGION }}/memberships/${{ env.GKE_CLUSTER }}

      - name: Install Helm
        uses: azure/setup-helm@v4.3.0

      - name: Helm deploy (upgrade --install)
        id: helm_deploy
        run: |
          helm upgrade --install payment-api charts/payment-api \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --values charts/payment-api/values-${{ inputs.environment || 'dev' }}.yaml \
            --set image.repository=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ github.sha }} \
            --set serviceAccount.annotations."iam\.gke\.io/gcp-service-account"=payment-api-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com \
            --set env[0].name=GCP_PROJECT_ID,env[0].value=${{ env.PROJECT_ID }} \
            --set env[1].name=SECRET_NAME,env[1].value=payment-api-key \
            --wait \
            --timeout 5m

      - name: Rollback on failure
        if: failure() && steps.helm_deploy.outcome == 'failure'
        run: |
          echo "Deploy failed — rolling back to previous release"
          helm rollback payment-api 0 --namespace ${{ env.NAMESPACE }} --wait
          exit 1
